<!DOCTYPE html>
<html lang="zh-CN" data-studio-scale="off">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/logo.png?v=1.0" type="image/png">
    <title>Adami-Canvas 资产库</title>
    <script>
        (function(){
            try {
                if(localStorage.getItem('adami_canvas_light_theme_20260622') !== '1') {
                    localStorage.setItem('studio_theme', 'light');
                    localStorage.setItem('canvas_theme', 'light');
                    localStorage.setItem('adami_canvas_light_theme_20260622', '1');
                }
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/lucide.js?v=1.0.1781845928"></script>
    <script src="/static/js/theme.js?v=1.0.1782107332"></script>
    <link rel="stylesheet" href="/static/css/theme.css?v=1.0.1781845928">
    <link rel="stylesheet" href="/static/css/asset-manager.css?v=1.0.1781966186">
<style>[data-manager-tab="workflows"],[data-tab="workflows"],.workflow-only{display:none!important}</style>
</head>
<body>
    <div class="asset-page">
        <header class="asset-page-head">
            <div>
                <div class="asset-title">资产库管理</div>
                <div class="asset-sub">管理素材、提示词、本地上传和画布资产。</div>
            </div>
            <div class="asset-head-actions">
                <div id="assetStatus" class="asset-status">准备就绪</div>
                <button id="refreshBtn" class="asset-btn" type="button"><i data-lucide="refresh-cw"></i><span>刷新</span></button>
            </div>
        </header>

        <div class="asset-tabs">
            <button id="assetTabAssets" class="active" type="button" data-tab="assets"><i data-lucide="library"></i><span>资产库</span></button>
            <button id="assetTabPrompts" type="button" data-tab="prompts"><i data-lucide="text-cursor-input"></i><span>提示词库</span></button>
            <button id="assetTabCanvasAssets" type="button" data-tab="canvas-assets"><i data-lucide="layout-dashboard"></i><span>画布资产</span></button>
            <button id="assetTabLocal" type="button" data-tab="local"><i data-lucide="folder-open"></i><span>本地素材</span></button>
        </div>

        <main id="assetManagerRoot" class="asset-manager-root"></main>
    </div>

    <input id="assetUploadInput" type="file" accept="image/*,video/*,audio/*,.json,.zip,application/json,application/zip" multiple hidden>
    <script src="/static/js/asset-manager.js?v=1.0.1782222588"></script>
</body>
</html>
